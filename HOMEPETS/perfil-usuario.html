<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>HuellaHome - Perfil de usuario</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="estilos.css">
  <style>
    .user-avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      overflow: hidden;
    }
    .user-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .user-name-title {
      text-align: center;
      font-size: 1.1rem;
      margin-bottom: 4px;
    }
    .user-email-subtitle {
      text-align: center;
      font-size: 0.85rem;
      color: #777;
      margin-bottom: 18px;
    }
    .user-form-label {
      display: block;
      font-size: 0.9rem;
      margin: 10px 0 4px;
      color: var(--brown);
    }
    .user-form-input {
      width: 100%;
    }
  </style>
</head>
<body class="auth-body">
  <main class="auth-page">
    <header class="app-header auth-header">
      <button class="back-btn" onclick="window.location.href='index.html'">←</button>
      <h1 class="app-title">Mi perfil</h1>
      <span></span>
    </header>

    <section class="auth-card">
      <div style="text-align:center;margin-bottom:16px;">
        <div class="user-avatar">
          <img src="img/avatar-default.png" alt="Foto de perfil" id="user-avatar-img">
        </div>
        <button class="edit-avatar-btn" id="btn-change-user-photo">✎</button>
        <input type="file" id="user-photo-input" accept="image/*" style="display:none;">

        <h2 class="user-name-title" id="perfil-nombre-header">Usuario HuellaHome</h2>
        <p class="user-email-subtitle" id="perfil-email-header"></p>
      </div>

      <form id="form-perfil-usuario" class="auth-form visible">
        <label class="user-form-label">
          Nombre completo
          <input type="text" id="perfil-nombre" class="auth-input user-form-input" required />
        </label>

        <label class="user-form-label">
          Correo electrónico
          <input type="email" id="perfil-email" class="auth-input user-form-input" required />
        </label>

        <label class="user-form-label">
          Teléfono (WhatsApp)
          <input type="tel" id="perfil-telefono" class="auth-input user-form-input" required />
        </label>

        <label class="user-form-label">
          Dirección de residencia
          <input type="text" id="perfil-direccion" class="auth-input user-form-input" />
        </label>

        <button type="submit" class="btn-primary auth-btn" style="margin-top:16px;">
          Guardar cambios
        </button>
      </form>
    </section>
  </main>



  
  <script>
    // Proteger página: si no hay sesión, volver a auth.html
    (function () {
      try {
        const usuario = localStorage.getItem('usuarioActual');
        if (!usuario) {
          window.location.href = 'auth.html';
        }
      } catch (e) {
        window.location.href = 'auth.html';
      }
    })();

    // Helpers para usuarios
    function getUsuarios() {
      try {
        return JSON.parse(localStorage.getItem('usuariosHuellaHome') || '[]');
      } catch (e) {
        return [];
      }
    }

    function saveUsuarios(users) {
      localStorage.setItem('usuariosHuellaHome', JSON.stringify(users));
    }

    function setUsuarioActual(user) {
      localStorage.setItem('usuarioActual', JSON.stringify({
        nombre:   user.nombre,
        email:    user.email,
        rol:      user.rol,
        telefono: user.telefono || '',
        fotoUser: user.fotoUser || null
      }));
    }

    // Referencias a elementos
    const userAvatarImg     = document.getElementById('user-avatar-img');
    const btnChangeUserPhoto = document.getElementById('btn-change-user-photo');
    const userPhotoInput    = document.getElementById('user-photo-input');
    const nombreHeader      = document.getElementById('perfil-nombre-header');
    const emailHeader       = document.getElementById('perfil-email-header');
    const inputNombre       = document.getElementById('perfil-nombre');
    const inputEmail        = document.getElementById('perfil-email');
    const inputTelefono     = document.getElementById('perfil-telefono');
    const inputDireccion    = document.getElementById('perfil-direccion');
    const formPerfil        = document.getElementById('form-perfil-usuario');

    let userPhotoData = null; // dataURL comprimida
    let usuarioActual = null;
    let emailOriginal = null;

    // Leer usuarioActual
    try {
      const raw = localStorage.getItem('usuarioActual');
      if (raw) {
        usuarioActual = JSON.parse(raw);
        emailOriginal = usuarioActual.email || null;
      }
    } catch (e) {
      usuarioActual = null;
    }

    // Función para comprimir imagen
    function compressImage(file, maxSize = 300, quality = 0.7) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            let width = img.width;
            let height = img.height;

            if (width > height) {
              if (width > maxSize) {
                height = Math.round(height * (maxSize / width));
                width = maxSize;
              }
            } else {
              if (height > maxSize) {
                width = Math.round(width * (maxSize / height));
                height = maxSize;
              }
            }

            canvas.width = width;
            canvas.height = height;
            ctx.drawImage(img, 0, 0, width, height);

            const dataUrl = canvas.toDataURL('image/jpeg', quality);
            resolve(dataUrl);
          };
          img.onerror = reject;
          img.src = e.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // Manejo de foto de usuario
    if (btnChangeUserPhoto && userPhotoInput) {
      btnChangeUserPhoto.addEventListener('click', () => {
        userPhotoInput.click();
      });

      userPhotoInput.addEventListener('change', async () => {
        const file = userPhotoInput.files && userPhotoInput.files[0];
        if (!file) return;
        try {
          userPhotoData = await compressImage(file, 300, 0.7);
          if (userPhotoData && userAvatarImg) {
            userAvatarImg.src = userPhotoData;
          }
        } catch (err) {
          console.error('Error al procesar la imagen de usuario:', err);
          alert('No se pudo procesar la foto. Intenta con otra imagen.');
          userPhotoData = null;
        }
      });
    }

    // Cargar datos actuales en el formulario
    if (usuarioActual && inputNombre && inputEmail && inputTelefono && inputDireccion) {
      const usuarios = getUsuarios();
      const userFull = usuarios.find(u => u.email === usuarioActual.email) || {};

      const nombre    = userFull.nombre   || usuarioActual.nombre   || '';
      const email     = userFull.email    || usuarioActual.email    || '';
      const telefono  = userFull.telefono || usuarioActual.telefono || '';
      const direccion = userFull.direccion || '';
      const fotoUser  = userFull.fotoUser || usuarioActual.fotoUser || null;

      if (fotoUser && userAvatarImg) {
        userAvatarImg.src = fotoUser;
        userPhotoData = fotoUser;
      }

      nombreHeader.textContent = nombre || 'Usuario HuellaHome';
      emailHeader.textContent  = email;

      inputNombre.value    = nombre;
      inputEmail.value     = email;
      inputTelefono.value  = telefono;
      inputDireccion.value = direccion;
    }

    // Guardar cambios
    if (formPerfil) {
      formPerfil.addEventListener('submit', (e) => {
        e.preventDefault();

        const nuevoNombre    = inputNombre.value.trim();
        const nuevoEmail     = inputEmail.value.trim().toLowerCase();
        const nuevoTelefono  = inputTelefono.value.trim();
        const nuevaDireccion = inputDireccion.value.trim();

        if (!nuevoNombre || !nuevoEmail || !nuevoTelefono) {
          alert('Por favor completa nombre, correo y teléfono.');
          return;
        }

        const usuarios = getUsuarios();

        // Verificar que el nuevo correo no esté usado por otro usuario
        const emailOcupado = usuarios.some(u => u.email === nuevoEmail && u.email !== emailOriginal);
        if (emailOcupado) {
          alert('Ya existe otra cuenta con ese correo electrónico.');
          return;
        }

        // Actualizar en usuariosHuellaHome
        const idx = usuarios.findIndex(u => u.email === emailOriginal);
        if (idx !== -1) {
          const user = usuarios[idx];
          usuarios[idx] = {
            ...user,
            nombre:   nuevoNombre,
            email:    nuevoEmail,
            telefono: nuevoTelefono,
            direccion: nuevaDireccion,
            fotoUser: userPhotoData || user.fotoUser || null
          };
        }

        saveUsuarios(usuarios);

        // Actualizar usuarioActual
        const userActualizado = usuarios.find(u => u.email === nuevoEmail) || {
          nombre:   nuevoNombre,
          email:    nuevoEmail,
          rol:      usuarioActual ? usuarioActual.rol : '',
          telefono: nuevoTelefono,
          fotoUser: userPhotoData || (usuarioActual && usuarioActual.fotoUser) || null
        };

        setUsuarioActual(userActualizado);
        usuarioActual = userActualizado;
        emailOriginal = nuevoEmail;

        nombreHeader.textContent = nuevoNombre || 'Usuario HuellaHome';
        emailHeader.textContent  = nuevoEmail;

        alert('Perfil actualizado correctamente.');
      });
    }
  </script>
</body>
</html>
