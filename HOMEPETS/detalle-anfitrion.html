<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>HuellaHome - Detalles de anfitrión</title>
  <link rel="stylesheet" href="estilos.css">
</head>
<body>
  <main class="page">

    <!-- Header -->
    <header class="app-header">
      <button class="back-btn" onclick="window.location.href='index.html'">←</button>
      <span class="app-title">Detalles del anfitrión</span>
      <span></span>
    </header>

    <!-- Contenedor detalle -->
    <section id="host-detail">
      <!-- Se rellena con JS -->
    </section>

  </main>

  <!-- Botón eliminar anfitrión -->
  <button class="btn-secondary" id="btn-delete-host"
          style="position:fixed;bottom:80px;left:50%;transform:translateX(-50%);max-width:380px;">
    Eliminar anfitrión
  </button>

  <!-- Botón reservar -->
  <button class="btn-primary" id="btn-reservar"
          style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);max-width:380px;">
    Reservar ahora
  </button>

  <!------------------------------- SCRIPT-------------------------------------->
  <script>
    const detailContainer = document.getElementById('host-detail');
    const btnDeleteHost   = document.getElementById('btn-delete-host');
    const btnReservar     = document.getElementById('btn-reservar');

    // Lee el índice del anfitrión seleccionado
    const rawIndex = localStorage.getItem('anfitrionSeleccionado');
    const hostIndex = rawIndex !== null ? Number(rawIndex) : -1;

    // --------- comprobar si el usuario actual es admin (tú) ----------
    let esAdmin = false;
    try {
      const rawUser = localStorage.getItem('usuarioActual');
      if (rawUser) {
        const user = JSON.parse(rawUser);
        // Cambia este correo si usas otro para tu cuenta de admin
        esAdmin = user.email === 'cristian35520@outlook.com';
      }
    } catch (e) {
      esAdmin = false;
    }

    // Si no es admin, ocultar el botón de eliminar
    if (!esAdmin && btnDeleteHost) {
      btnDeleteHost.style.display = 'none';
    }
    // ---------------------------------------------------------------

    function renderHostDetail() {
      if (!detailContainer) return;

      const data = JSON.parse(localStorage.getItem('anfitriones') || '[]');
      const host = data[hostIndex];

      if (!host) {
        detailContainer.innerHTML = '<p>No se encontró la información del anfitrión.</p>';
        return;
      }

      const foto = host.foto || 'img/anfitrion.jpg';

      detailContainer.innerHTML = `
        <section style="margin-bottom:16px;">
          </static/img src="${foto}" alt="Foto del anfitrión" class="host-hero">
        </section>

        <section style="display:flex;align-items:center;gap:12px;margin-bottom:18px;">
          <div class="host-avatar">
            </static/img src="${foto}" alt="Foto anfitrión">
          </div>
          <div>
            <h2 style="margin:0;font-size:1.2rem;">${host.nombre || 'Anfitrión sin nombre'}</h2>
            <p style="margin:2px 0 0;font-size:0.9rem;color:var(--muted);">
              ${host.alojamiento || ''} · ${host.mascotas || ''}
            </p>
          </div>
        </section>

        <section class="host-section">
          <div class="host-section-header">
            <span>Sobre mí</span>
          </div>
          <p class="host-section-text">
            ${host.descripcion || 'Este anfitrión aún no ha agregado una descripción.'}
          </p>
        </section>

        <section class="host-section">
          <div class="host-section-header">
            <span>Mi hogar</span>
          </div>
          <p class="host-section-text">
            ${host.direccion || 'Dirección no especificada.'}
          </p>
        </section>

        <section class="host-section">
          <div class="host-section-header">
            <span>Contacto</span>
          </div>
          <p class="host-section-text">
            Teléfono: ${host.celular || 'No registrado.'}
          </p>
        </section>

        <section class="host-section">
          <div class="host-section-header">
            <span>Extras</span>
          </div>
          <p class="host-section-text">
            ${host.tieneMascotas ? 'Tiene mascotas en casa.' : 'No tiene mascotas en casa.'}<br>
            ${host.experiencia ? 'Tiene experiencia cuidando mascotas.' : 'Sin experiencia registrada.'}
          </p>
        </section>
      `;
    }

    // --------------------------- Abrir WhatsApp al reservar -------------------------------------------
    if (btnReservar) {
      btnReservar.addEventListener('click', () => {
        const data = JSON.parse(localStorage.getItem('anfitriones') || '[]');
        const host = data[hostIndex];

        if (!host || !host.celular) {
          alert('Este anfitrión no tiene número de WhatsApp registrado.');
          return;
        }

        // Limpia el número: quita espacios y caracteres raros
        const rawPhone = host.celular.replace(/[^\d]/g, '');

        // Si no trae indicativo, asumimos Colombia (57)
        const telefonoIntl = rawPhone.startsWith('57') ? rawPhone : '57' + rawPhone;

        const mensaje = encodeURIComponent(
          `Hola ${host.nombre || ''}, vi tu perfil en HuellaHome y me gustaría reservar hospedaje para mi mascota.`
        );

        const url = `https://wa.me/${telefonoIntl}?text=${mensaje}`;

        window.open(url, '_blank'); // abre en nueva pestaña/ventana
      });
    }
    // --------------------------- FIN de WhatsApp -------------------------------------------

    renderHostDetail();

    // --------------------------- Boton eliminar anfitrion ----------------------------------
    if (btnDeleteHost && esAdmin) {
      btnDeleteHost.addEventListener('click', () => {
        if (!confirm('¿Seguro que deseas eliminar este anfitrión?')) return;

        const data = JSON.parse(localStorage.getItem('anfitriones') || '[]');

        if (hostIndex < 0 || hostIndex >= data.length) {
          alert('No se pudo eliminar el anfitrión.');
          return;
        }

        data.splice(hostIndex, 1); // elimina el anfitrión
        localStorage.setItem('anfitriones', JSON.stringify(data));

        alert('Anfitrión eliminado');
        window.location.href = 'index.html';
      });
    }

    renderHostDetail();
  </script>
</body>
</html>
