<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>HuellaHome - Perfil de mascota</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/static/estilos.css">
  <style>
    .pet-avatar {
      width: 180px;
      height: 180px;
      margin: 0 auto;
      border-radius: 50%;
      overflow: hidden;
      background: #f6e0b8;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.12);
    }

    .pet-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .back-btn {
      border: none;
      background: transparent;
      font-size: 1.4rem;
      cursor: pointer;
    }

    .edit-avatar-btn {
      margin-top: 12px;
      border: none;
      border-radius: 999px;
      padding: 8px 14px;
      background: var(--green);
      color: #fff;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .field-label {
      display: block;
      margin: 10px 0 4px;
      font-size: 0.9rem;
      color: var(--brown);
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 14px 0;
      padding: 10px 14px;
      border-radius: var(--radius-pill);
      background: #f4f1ea;
      font-size: 0.9rem;
    }

    .notes-area {
      width: 100%;
      min-height: 110px;
      padding: 12px 14px;
      border-radius: 20px;
      border: none;
      resize: vertical;
      font-family: var(--font-main);
      font-size: 0.9rem;
      box-sizing: border-box;
    }

    .input-tipo-mascota,
    .input-nombre,
    .input-raza,
    .input-edad {
      width: 100%;
    }
  </style>
</head>
<body>
  <main class="page">

    <header class="app-header">
      <button class="back-btn" onclick="window.location.href='/'">
        ←
      </button>
      <span class="app-title">Perfil de mascota</span>
      <span></span>
    </header>

    <section style="text-align:center;margin-bottom:24px;">
      <div class="pet-avatar">
        <img src="/static/img/registro-mascotas.png" alt="Foto mascota" id="pet-photo">
      </div>
      <button class="edit-avatar-btn" id="btn-change-pet-photo">✎</button>
      <input type="file" id="pet-photo-input" accept="image/*" style="display:none;">
    </section>

    <section>
      <label class="field-label">Tipo de mascota</label>
      <input
        class="input-pill input-tipo-mascota"
        type="text"
        placeholder="Perro, Gato, Pájaro..."
        name="tipo_mascota"
      >

      <label class="field-label">Nombre</label>
      <input class="input-pill input-nombre" type="text" placeholder="Fido" name="nombre">

      <label class="field-label">Raza</label>
      <input class="input-pill input-raza" type="text" placeholder="Golden Retriever" name="raza">

      <label class="field-label">Edad</label>
      <input class="input-pill input-edad" type="text" placeholder="2 años" name="edad">

      <label class="field-label">Vacunas que tiene</label>
      <input
        class="input-pill pet-vacunas"
        type="text"
        placeholder="Ej. Rabia, triple felina, parvovirus"
      >

      <label class="field-label">Notas de comportamiento</label>
      <textarea
        class="notes-area"
        placeholder="Le gustan las caricias, le asustan los truenos..."
        name="notas"
      ></textarea>
    </section>

  </main>

  <button
    class="btn-primary"
    id="btn-save-pet"
    style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);max-width:380px;"
  >
    Guardar perfil
  </button>

  <script>
    const API_BASE = "";

    function getInputValue(selector) {
      const el = document.querySelector(selector);
      return el ? el.value.trim() : '';
    }

    const btnSavePet = document.getElementById('btn-save-pet');
    const petPhotoImg = document.getElementById('pet-photo');
    const btnChangePetPhoto = document.getElementById('btn-change-pet-photo');
    const petPhotoInput = document.getElementById('pet-photo-input');

    let petPhotoData = null;

    function compressImage(file, maxSize = 300, quality = 0.7) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();

        reader.onload = (e) => {
          const img = new Image();

          img.onload = () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            let width = img.width;
            let height = img.height;

            if (width > height) {
              if (width > maxSize) {
                height = Math.round(height * (maxSize / width));
                width = maxSize;
              }
            } else {
              if (height > maxSize) {
                width = Math.round(width * (maxSize / height));
                height = maxSize;
              }
            }

            canvas.width = width;
            canvas.height = height;
            ctx.drawImage(img, 0, 0, width, height);

            const dataUrl = canvas.toDataURL('image/jpeg', quality);
            resolve(dataUrl);
          };

          img.onerror = reject;
          img.src = e.target.result;
        };

        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    if (btnChangePetPhoto && petPhotoInput) {
      btnChangePetPhoto.addEventListener('click', () => {
        petPhotoInput.click();
      });

      petPhotoInput.addEventListener('change', async () => {
        const file = petPhotoInput.files && petPhotoInput.files[0];
        if (!file) return;

        try {
          petPhotoData = await compressImage(file, 300, 0.7);
          if (petPhotoData && petPhotoImg) {
            petPhotoImg.src = petPhotoData;
          }
        } catch (err) {
          console.error('Error al procesar la imagen de la mascota:', err);
          alert('No se pudo procesar la foto. Intenta con otra imagen.');
          petPhotoData = null;
        }
      });
    }

    if (btnSavePet) {
      btnSavePet.addEventListener('click', async () => {
        let usuario = null;

        try {
          const rawUser = localStorage.getItem('usuarioActual');
          if (rawUser) {
            usuario = JSON.parse(rawUser);
          }
        } catch (e) {
          usuario = null;
        }

        if (!usuario || !usuario.id) {
          alert("Debes iniciar sesión para registrar una mascota.");
          return;
        }

        const payload = {
          tipo_mascota: getInputValue('.input-tipo-mascota'),
          nombre: getInputValue('.input-nombre'),
          raza: getInputValue('.input-raza'),
          edad: getInputValue('.input-edad'),
          notas: getInputValue('.notes-area'),
          vacunas: getInputValue('.pet-vacunas'),
          convive: document.querySelector('.pet-convive')?.checked ? "si" : "no",
          foto: petPhotoData,
          usuario_id: usuario.id
        };

        if (!payload.tipo_mascota) {
          alert("El tipo de mascota es obligatorio.");
          return;
        }

        if (!payload.nombre) {
          alert("El nombre de la mascota es obligatorio.");
          return;
        }

        try {
          const response = await fetch(`${API_BASE}/mascotas`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
          });

          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.detail || "Error al crear mascota");
          }

          alert("Mascota guardada correctamente 🐶");
          window.location.href = "/";

        } catch (error) {
          console.error("Error al guardar mascota:", error);
          alert("Error al guardar la mascota");
        }
      });
    }
  </script>
</body>
</html>
