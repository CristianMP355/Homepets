<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>HuellaHome - Perfil anfitrión</title>
  <link rel="stylesheet" href="estilos.css">
</head>
<body>
  <main class="page">

    <!----------- Header (titulo) --------------->
    <header class="app-header">
      <button class="back-btn" onclick="window.location.href='index.html'">
        ←
      </button>
      <span class="app-title">Perfil anfitrión</span>
      <span></span>
    </header>

    <!----------- Avatar anfitrión --------------->
    <section style="text-align:center;margin-bottom:24px;">
      <div class="host-avatar">
        <img src="img/anfitrion.jpg" alt="Foto anfitrión" id="host-photo">
      </div>
      <button class="edit-avatar-btn" id="btn-change-photo">Cambiar foto</button>
      <input type="file" id="host-photo-input" accept="image/*" style="display:none;">
    </section>

    <!----------- Formulario de anfitrion -------->
    <section>
      <label class="field-label">Nombres y Apellidos completos</label>
      <input class="input-pill host-nombre" type="text" placeholder="Nombre y apellido">

      <div class="host-form-group">
        <label class="field-label">Número de cédula</label>
        <input class="input-pill host-cedula" type="number" placeholder="Ej. 1234567890">
      </div>

      <label class="field-label">Número de celular</label>
      <input class="input-pill host-celular" type="tel" placeholder="Ej. 3178737111">

      <label class="field-label">Direccion / Barrio / Cuidad </label>
      <input class="input-pill host-direccion" type="text"
             placeholder="Ej. Calle 25c # 00-00, Olímpico, Palmira">

      <label class="field-label">Tipo de alojamiento</label>
      <input class="input-pill host-alojamiento" type="text"
             placeholder="Apartamento, casa, finca...">

      <label class="field-label">Mascotas que acepta</label>
      <input class="input-pill host-mascotas" type="text"
             placeholder="Perros, Gatos, Peces...">

      <div class="toggle-row">
        <span>Tiene mascotas en casa</span>
        <input type="checkbox" class="host-tiene-mascotas">
      </div>

      <div class="toggle-row">
        <span>Experiencia cuidando mascotas</span>
        <input type="checkbox" class="host-experiencia">
      </div>

      <label class="field-label">Sobre mi, descripcion tuya para los dueños...</label>
      <textarea class="notes-area host-descripcion"
                placeholder="Cuenta cómo cuidas a las mascotas."></textarea>
    </section>

  </main>

  <!------------------ Botón guardar -------------------->
  <button class="btn-primary"
          id="btn-save-host"
          style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);max-width:380px;">
    Guardar perfil
  </button>

  <!------------- Script del botón guardar perfil ----------->
  <script>
    function getHostValue(selector) {
      const el = document.querySelector(selector);
      return el ? el.value.trim() : '';
    }

    const btnSaveHost    = document.getElementById('btn-save-host');
    const hostPhotoImg   = document.getElementById('host-photo');
    const btnChangePhoto = document.getElementById('btn-change-photo');
    const hostPhotoInput = document.getElementById('host-photo-input');

    let hostPhotoData = null; // aquí guardamos la foto como base64


    // Función para comprimir imagen con canvas
  function compressImage(file, maxSize = 300, quality = 0.7) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();

      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');

          let width = img.width;
          let height = img.height;

          // Redimensionar manteniendo proporción
          if (width > height) {
            if (width > maxSize) {
              height = Math.round(height * (maxSize / width));
              width = maxSize;
            }
          } else {
            if (height > maxSize) {
              width = Math.round(width * (maxSize / height));
              height = maxSize;
            }
          }

          canvas.width = width;
          canvas.height = height;
          ctx.drawImage(img, 0, 0, width, height);

          // Exportar a base64 JPEG comprimido
          const dataUrl = canvas.toDataURL('image/jpeg', quality);
          resolve(dataUrl);
        };
        img.onerror = reject;
        img.src = e.target.result;
      };

      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }


    // Abrir selector de archivos al pulsar "Cambiar foto"
    if (btnChangePhoto && hostPhotoInput) {
      btnChangePhoto.addEventListener('click', () => {
        hostPhotoInput.click();
      });

      hostPhotoInput.addEventListener('change', () => {
        const file = hostPhotoInput.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
          hostPhotoData = e.target.result;             // data URL
          if (hostPhotoImg) hostPhotoImg.src = hostPhotoData; // previsualizar
        };
        reader.readAsDataURL(file);
      });
    }

    // Guardar perfil (UN solo listener)
    if (btnSaveHost) {
      btnSaveHost.addEventListener('click', () => {
        const host = {
          nombre:       getHostValue('.host-nombre'),
          cedula:       getHostValue('.host-cedula'),
          celular:      getHostValue('.host-celular'),
          direccion:    getHostValue('.host-direccion'),
          alojamiento:  getHostValue('.host-alojamiento'),
          mascotas:     getHostValue('.host-mascotas'),
          descripcion:  getHostValue('.host-descripcion'),
          tieneMascotas: document.querySelector('.host-tiene-mascotas')?.checked || false,
          experiencia:   document.querySelector('.host-experiencia')?.checked || false,
          foto:          hostPhotoData                  // puede ser null si no cambió foto
        };

        const current = JSON.parse(localStorage.getItem('anfitriones') || '[]');
        current.push(host);
        localStorage.setItem('anfitriones', JSON.stringify(current));

        alert('Perfil de anfitrión guardado');
        window.location.href = 'index.html';
      });
    }
  </script>
</body>
</html>
